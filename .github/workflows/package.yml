name: Package PHP
run-name: Package PHP ${{ inputs.php-version || '8.4' }}

on:
  workflow_dispatch:
    inputs:
      source-run-id:
        description: 'Build PHP run ID to download SAPI artifacts from'
        required: true
      rebuild-missing-sapi:
        description: 'Build any SAPI artifacts missing from the source run'
        default: 'false'
        required: false
      build-mode:
        description: 'Build mode: --build-all or --build-new'
        default: '--build-all'
        required: false
      php-source:
        description: 'PHP source: --web-php or --php-src'
        default: ''
        required: false
      php-version:
        description: 'PHP version to package'
        default: '8.4'
        required: false
      container-os-versions:
        description: 'OS versions to package on'
        default: 'ubuntu:22.04 ubuntu:24.04 ubuntu:26.04 arm64v8/ubuntu:22.04 arm64v8/ubuntu:24.04 arm64v8/ubuntu:26.04 debian:11 debian:12 debian:trixie'
        required: false

permissions:
  actions: read
  contents: write

env:
  CONTAINER_OS_LIST: ubuntu:22.04 ubuntu:24.04 ubuntu:26.04 arm64v8/ubuntu:22.04 arm64v8/ubuntu:24.04 arm64v8/ubuntu:26.04 debian:11 debian:12 debian:trixie
  RUNNER_OS_LIST: ubuntu-22.04 ubuntu-24.04 ubuntu-22.04-arm ubuntu-24.04-arm
  PHP_LIST: ${{ inputs.php-version }}
  SAPI_LIST: apache2 cgi cli embed fpm phpdbg
  BUILD_LIST: nts zts
  PHP_SOURCE: ${{ inputs.php-source }}
  CONTAINER_BASE: ubuntu-24.04
  CONTAINER_BASE_ARM: ubuntu-24.04-arm

jobs:
  get-matrix:
    runs-on: ubuntu-latest
    outputs:
      container_only: ${{ steps.set-matrix.outputs.container_only }}
      container_os_matrix: ${{ steps.set-matrix.outputs.container_os_matrix }}
      sapi_os_matrix: ${{ steps.set-matrix.outputs.sapi_os_matrix }}
      test_container_os_matrix: ${{ steps.set-matrix.outputs.test_container_os_matrix }}
      test_runner_os_matrix: ${{ steps.set-matrix.outputs.test_runner_os_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get matrix
        id: set-matrix
        env:
          COMMIT: ${{ inputs.build-mode }}
          CONTAINER_OS_LIST: ${{ inputs.container-os-versions || env.CONTAINER_OS_LIST }}
          CONTAINER_BASE: ${{ env.CONTAINER_BASE }}
          CONTAINER_BASE_ARM: ${{ env.CONTAINER_BASE_ARM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_OS_LIST: ${{ env.RUNNER_OS_LIST }}
          PHP_LIST: ${{ inputs.php-version }}
          PHP_SOURCE: ${{ inputs.php-source || '--web-php' }}
          SAPI_LIST: ${{ env.SAPI_LIST }}
          BUILD_LIST: ${{ env.BUILD_LIST }}
        run: bash scripts/get-matrix.sh

  source-artifacts:
    runs-on: ubuntu-latest
    outputs:
      names: ${{ steps.list-artifacts.outputs.names }}

    steps:
      - name: List source artifacts
        id: list-artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ inputs.source-run-id }}
        run: |
          names="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100" --paginate --jq '.artifacts[].name')"
          {
            echo 'names<<EOF'
            echo "$names"
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build_sapi:
    needs: [get-matrix, source-artifacts]
    if: "!contains(inputs.build-mode, 'skip-build')"
    runs-on: ${{ matrix.container-base }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.get-matrix.outputs.sapi_os_matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check source artifact
        id: source-artifact
        shell: bash
        env:
          ARTIFACT_NAME: php-sapi-${{ matrix.sapi }}-${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
          ARTIFACT_NAMES: ${{ needs.source-artifacts.outputs.names }}
        run: |
          if grep -Fx "$ARTIFACT_NAME" <<< "$ARTIFACT_NAMES"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on missing SAPI artifact
        if: steps.source-artifact.outputs.exists != 'true' && inputs.rebuild-missing-sapi != 'true'
        env:
          ARTIFACT_NAME: php-sapi-${{ matrix.sapi }}-${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
        run: |
          echo "Missing $ARTIFACT_NAME in run ${{ inputs.source-run-id }}"
          exit 1

      - name: Install required packages
        if: steps.source-artifact.outputs.exists != 'true' && inputs.rebuild-missing-sapi == 'true'
        run: bash scripts/install-requirements.sh
        env:
          BUILD: ${{ matrix.build }}
          PHP_VERSION: ${{ matrix.php-version }}

      - name: Build and package SAPI
        if: steps.source-artifact.outputs.exists != 'true' && inputs.rebuild-missing-sapi == 'true'
        run: bash scripts/build.sh build_sapi "${SAPI}"
        env:
          BUILD: ${{ matrix.build }}
          GITHUB_MESSAGE: ${{ inputs.build-mode }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ matrix.php-version }}
          PHP_SOURCE: ${{ inputs.php-source }}
          SAPI: ${{ matrix.sapi }}

      - name: Upload Artifact
        if: steps.source-artifact.outputs.exists != 'true' && inputs.rebuild-missing-sapi == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: php-sapi-${{ matrix.sapi }}-${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
          path: /tmp/debian/*.zst

  package:
    needs: [get-matrix, source-artifacts, build_sapi]
    if: "!contains(inputs.build-mode, 'skip-merge') && !contains(inputs.build-mode, 'skip-extensions') && !contains(inputs.build-mode, 'skip-package')"
    container: ${{ matrix.container }}
    runs-on: ${{ matrix.container-base }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.get-matrix.outputs.container_os_matrix)}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install required packages
        run: bash scripts/install-requirements.sh
        env:
          BUILD: ${{ matrix.build }}
          PHP_VERSION: ${{ matrix.php-version }}

      - name: Check source SAPI artifacts
        id: source-sapi-artifacts
        shell: bash
        env:
          ARTIFACT_NAMES: ${{ needs.source-artifacts.outputs.names }}
          BUILD: ${{ matrix.build }}
          DIST: ${{ matrix.dist }}
          DIST_VERSION: ${{ matrix.dist-version }}
          PHP_VERSION: ${{ matrix.php-version }}
          SAPI_LIST: ${{ env.SAPI_LIST }}
        run: |
          exists=false
          for sapi in $SAPI_LIST; do
            artifact_name="php-sapi-$sapi-$PHP_VERSION-$BUILD+$DIST-$DIST_VERSION"
            if grep -Fxq "$artifact_name" <<< "$ARTIFACT_NAMES"; then
              exists=true
              break
            fi
          done
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: Download source SAPI artifacts
        if: steps.source-sapi-artifacts.outputs.exists == 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ inputs.source-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          pattern: php-sapi-*-${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
          path: /tmp/source-artifacts
          merge-multiple: true

      - name: Download rebuilt SAPI artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: php-sapi-*-${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
          path: /tmp/rebuilt-artifacts

      - name: Stage builds
        shell: bash
        env:
          SAPI_LIST: ${{ env.SAPI_LIST }}
        run: |
          mkdir -p /tmp/debian
          expected_count="$(wc -w <<< "$SAPI_LIST" | xargs)"
          mapfile -t sapi_builds < <(find /tmp/source-artifacts /tmp/rebuilt-artifacts -type f -name '*.zst' 2>/dev/null | sort)
          if [ "${#sapi_builds[@]}" -ne "$expected_count" ]; then
            echo "Expected $expected_count SAPI builds, found ${#sapi_builds[@]}"
            printf '%s\n' "${sapi_builds[@]}"
            exit 1
          fi
          for sapi_build in "${sapi_builds[@]}"; do
            tar -I zstd -xf "$sapi_build" -C /tmp/debian
          done

      - name: Merge SAPI builds
        run: bash scripts/build.sh merge
        env:
          BUILD: ${{ matrix.build }}
          SAPI_LIST: ${{ env.SAPI_LIST }}
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_MESSAGE: ${{ inputs.build-mode }}
          GITHUB_NAME: 'Shivam Mathur'
          GITHUB_EMAIL: ${{ secrets.email }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          PHP_VERSION: ${{ matrix.php-version }}
          PHP_SOURCE: ${{ inputs.php-source }}

      - name: Build extensions
        run: bash scripts/build.sh build_extensions
        env:
          BUILD: ${{ matrix.build }}
          SAPI_LIST: ${{ env.SAPI_LIST }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_VERSION: ${{ matrix.php-version }}
          PHP_SOURCE: ${{ inputs.php-source }}

      - name: Package build
        run: bash scripts/build.sh package
        env:
          BUILD: ${{ matrix.build }}
          SAPI_LIST: ${{ env.SAPI_LIST }}
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_MESSAGE: ${{ inputs.build-mode }}
          GITHUB_NAME: 'Shivam Mathur'
          GITHUB_EMAIL: ${{ secrets.email }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          PHP_VERSION: ${{ matrix.php-version }}
          PHP_SOURCE: ${{ inputs.php-source }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: php${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
          path: |
            /tmp/*.xz
            /tmp/*.zst

      - name: Check php-cli version
        run: |
          php -v
          php -r "if(strpos(phpversion(), '${{ matrix.php-version }}') === false) {throw new Exception('Wrong PHP version Installed');}"

      - name: Check php-cgi version
        run: php-cgi -v

      - name: Check php-fpm version
        run: php-fpm -v && php-fpm -t

      - name: Check phpdbg version
        run: phpdbg -V

      - name: Check pecl version
        run: pecl -V

      - name: Check php-config version
        run: php-config --version

      - name: Check phpize version
        run: phpize -v

      - name: Check php extensions
        run: bash scripts/test_extensions.sh
        env:
          PHP_VERSION: ${{ matrix.php-version }}

  local-test:
    needs: [package, get-matrix]
    runs-on: ${{ matrix.container-base }}
    if: "!contains(inputs.build-mode, 'skip-local-test')"
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.get-matrix.outputs.test_container_os_matrix)}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: php${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.dist }}-${{ matrix.dist-version }}
          path: /tmp

      - name: Install PHP
        shell: bash
        run: |
          sed -i '/download/d' scripts/install.sh
          bash scripts/install.sh ${{ matrix.php-version }} local ${{ matrix.debug }} ${{ matrix.build }}

      - name: Test
        run: |
          php -v
          php -r "if(strpos(phpversion(), '${{ matrix.php-version }}') === false) {throw new Exception('Wrong PHP version Installed');}"
          php -m

      - name: Check GD support
        run: php -r "print_r(gd_info());"

      - name: Test pecl
        run: bash scripts/test_pecl.sh
        env:
          PHP_VERSION: ${{ matrix.php-version }}

      - name: Check SAPI
        run: bash scripts/test_sapi.sh
        env:
          PHP_VERSION: ${{ matrix.php-version }}

  github-test:
    needs: [package, get-matrix]
    runs-on: ${{ matrix.os }}
    if: "!contains(inputs.build-mode, 'skip-github-test') && contains(needs.get-matrix.outputs.container_only, 'false')"
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.get-matrix.outputs.test_runner_os_matrix)}}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: php${{ matrix.php-version }}-${{ matrix.build }}+${{ matrix.os }}
          path: /tmp

      - name: Install PHP
        shell: bash
        run: |
          sed -i '/download/d' scripts/install.sh
          bash scripts/install.sh ${{ matrix.php-version }} github ${{ matrix.debug }} ${{ matrix.build }}

      - name: Test
        run: |
          php -v
          php -r "if(strpos(phpversion(), '${{ matrix.php-version }}') === false) {throw new Exception('Wrong PHP version Installed');}"
          php -m

      - name: Test pecl
        run: bash scripts/test_pecl.sh
        env:
          PHP_VERSION: ${{ matrix.php-version }}

      - name: Check SAPI
        run: bash scripts/test_sapi.sh
        env:
          PHP_VERSION: ${{ matrix.php-version }}

  release-container-only:
    needs: [get-matrix, local-test]
    runs-on: ubuntu-latest
    if: "!contains(inputs.build-mode, 'skip-release') && contains(needs.get-matrix.outputs.container_only, 'true')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create builds directory
        run: mkdir builds

      - uses: actions/download-artifact@v8
        with:
          path: builds

      - name: Release
        run: bash scripts/release.sh
        env:
          GITHUB_MESSAGE: ${{ inputs.build-mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_LIST: ${{ inputs.php-version }}
          PHP_SOURCE: ${{ inputs.php-source }}

  release:
    needs: [get-matrix, local-test, github-test]
    runs-on: ubuntu-latest
    if: "!contains(inputs.build-mode, 'skip-release') && contains(needs.get-matrix.outputs.container_only, 'false')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create builds directory
        run: mkdir builds

      - uses: actions/download-artifact@v8
        with:
          path: builds

      - name: Release
        run: bash scripts/release.sh
        env:
          GITHUB_MESSAGE: ${{ inputs.build-mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHP_LIST: ${{ inputs.php-version }}
          PHP_SOURCE: ${{ inputs.php-source }}
